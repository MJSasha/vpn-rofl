version: '3.8'
services:
  vpn-manager:
    build: .
    network_mode: host
    environment:
      - SSH_HOST=192.168.1.1
      - SSH_PORT=222
      - SSH_USER=root
      - SSH_PASS=keenetic
      - CONFIG_PATH=/opt/etc/mihomo/config.yaml
      - MIHOMO_API=http://192.168.1.1:9090
    restart: unless-stopped
