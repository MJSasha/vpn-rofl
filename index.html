<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mihomo Manager</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vuedraggable@4.1.0/dist/vuedraggable.umd.min.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 transition-all duration-300 dark:bg-slate-950 dark:text-slate-100">
    <div id="app" v-cloak class="min-h-screen pb-20">
        <!-- Sticky Header Area -->
        <header class="sticky top-0 z-[100] bg-slate-50/90 backdrop-blur-md border-b border-transparent transition-all duration-300 dark:bg-slate-950/90"
                :class="{'border-slate-200 shadow-sm bg-white/95 dark:bg-slate-900/95 dark:border-slate-800': isScrolled}">
            <div class="container mx-auto px-4 md:px-8 max-w-4xl py-3 md:py-4 flex flex-col gap-4 md:gap-6">
                <!-- Top Row: Title & Actions -->
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <div class="flex items-center gap-6">
                        <div>
                            <h1 class="text-2xl md:text-3xl font-black text-slate-800 tracking-tight flex items-center gap-2 dark:text-white">
                                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="text-blue-600"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                                <span class="hidden sm:inline">{{ t('title') }}</span>
                                <span class="sm:hidden">Rules</span>
                            </h1>
                            <div class="flex items-center gap-3 mt-0.5 md:mt-1">
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-slate-100 px-2 py-0.5 rounded dark:bg-slate-800">{{ t('manager') }}</span>
                                <div class="flex gap-2 text-[10px] font-bold uppercase tracking-tight">
                                    <span class="text-slate-500">{{ rules.length }} <span class="text-slate-400">{{ t('total') }}</span></span>
                                    <span class="text-green-600">{{ activeCount }} <span class="text-slate-400">{{ t('active') }}</span></span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center gap-2">
                        <transition name="fade">
                            <div v-if="hasChanges" class="hidden lg:flex items-center gap-2 text-blue-600 font-black text-[10px] uppercase tracking-wider bg-blue-50 px-3 py-2 rounded-xl border border-blue-100 shadow-sm dark:bg-blue-900/20 dark:border-blue-800">
                                <span class="relative flex h-2 w-2">
                                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                                    <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-600"></span>
                                </span>
                                {{ t('notSaved') }}
                            </div>
                        </transition>

                        <button @click="toggleLang" 
                                class="flex items-center justify-center w-10 h-10 bg-white border border-slate-200 text-slate-500 hover:text-blue-600 rounded-xl shadow-sm transition-all active:scale-95 dark:bg-slate-800 dark:border-slate-700 dark:text-slate-400 font-bold text-[10px] uppercase"
                                :title="lang === 'ru' ? 'English' : 'Русский'">
                            {{ lang === 'ru' ? 'EN' : 'RU' }}
                        </button>

                        <button @click="toggleTheme" 
                                class="flex items-center justify-center w-10 h-10 bg-white border border-slate-200 text-slate-500 hover:text-blue-600 rounded-xl shadow-sm transition-all active:scale-95 dark:bg-slate-800 dark:border-slate-700 dark:text-slate-400"
                                :title="isDark ? t('lightTheme') : t('darkTheme')">
                            <svg v-if="!isDark" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                            <svg v-else xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.07" x2="5.64" y2="17.66"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                        </button>

                        <button @click="updateApp"
                                class="bg-slate-800 hover:bg-black text-white px-3 md:px-4 py-2 rounded-xl text-xs font-bold transition-all flex items-center gap-2 shadow-lg shadow-slate-200 active:scale-95 dark:bg-slate-700 dark:hover:bg-slate-600 dark:shadow-none"
                                :title="t('update')">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            <span class="hidden sm:inline">{{ t('update') }}</span>
                        </button>

                        <button @click="saveConfig"
                                :disabled="loading || !hasChanges"
                                class="bg-blue-600 hover:bg-blue-700 disabled:opacity-40 disabled:grayscale text-white px-3 md:px-5 py-2 rounded-xl text-xs font-bold transition-all flex items-center gap-2 shadow-lg shadow-blue-200 dark:shadow-none active:scale-95"
                                :title="t('save')">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                            <span class="hidden sm:inline">{{ t('save') }}</span>
                        </button>
                    </div>
                </div>

                <!-- Bottom Row: Filters & Search -->
                <div class="flex flex-col md:flex-row gap-3 items-center">
                    <div class="w-full flex-grow relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-colors group-focus-within:text-blue-500 text-slate-400">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </div>
                        <input type="text" v-model="searchQuery"
                               :placeholder="t('search')"
                               class="block w-full pl-11 pr-10 h-[48px] border border-slate-200 rounded-2xl bg-white focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 shadow-sm transition-all text-sm dark:bg-slate-800 dark:border-slate-700 dark:text-white dark:placeholder-slate-500">
                        <button v-if="searchQuery" @click="searchQuery = ''" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-300 hover:text-slate-500">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>

                    <div class="flex flex-wrap md:flex-nowrap gap-2 w-full md:w-auto">
                        <div class="relative flex-grow min-w-[140px]">
                            <select v-model="selectedGroup"
                                    class="block w-full pl-4 pr-10 h-[48px] border border-slate-200 rounded-2xl bg-white focus:outline-none focus:ring-4 focus:ring-blue-500/10 shadow-sm text-sm appearance-none cursor-pointer text-slate-600 font-bold dark:bg-slate-800 dark:border-slate-700 dark:text-slate-300">
                                <option value="">{{ t('allGroups') }}</option>
                                <option v-for="g in proxyGroups" :key="g" :value="g">{{g}}</option>
                            </select>
                            <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400">
                                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>

                        <button @click="addRule"
                                class="flex-grow md:flex-shrink-0 flex items-center justify-center h-[48px] px-4 md:px-5 bg-white border border-slate-200 hover:border-blue-400 hover:text-blue-600 text-slate-600 rounded-2xl shadow-sm transition-all text-sm font-black gap-2 active:scale-95 dark:bg-slate-800 dark:border-slate-700 dark:text-slate-300 dark:hover:text-blue-400">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            <span class="md:hidden lg:inline">{{ t('addRule') }}</span>
                        </button>

                        <div class="flex gap-2">
                            <button @click="addGroup" :title="t('addGroup')"
                                    class="flex-shrink-0 flex items-center justify-center w-[48px] h-[48px] bg-white border border-slate-200 hover:border-blue-400 text-slate-400 hover:text-blue-600 rounded-2xl shadow-sm transition-all active:scale-95 dark:bg-slate-800 dark:border-slate-700 dark:text-slate-500">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                            </button>

                            <button @click="fetchConfig" :title="t('refreshList')"
                                    class="flex-shrink-0 flex items-center justify-center w-[48px] h-[48px] bg-white border border-slate-200 hover:border-blue-400 text-slate-400 hover:text-blue-600 rounded-2xl shadow-sm transition-all active:scale-95 dark:bg-slate-800 dark:border-slate-700 dark:text-slate-500">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="container mx-auto px-4 md:px-8 max-w-4xl mt-8">
            <!-- Rules Table -->
            <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/40 border border-slate-100 overflow-hidden dark:bg-slate-900 dark:border-slate-800 dark:shadow-none">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse md:table-fixed block md:table">
                        <thead class="bg-slate-50/80 border-b border-slate-100 dark:bg-slate-800/50 dark:border-slate-800 hidden md:table-header-group">
                            <tr class="text-slate-400 uppercase text-[10px] font-black tracking-widest dark:text-slate-500">
                                <th class="px-4 py-4 w-12"></th>
                                <th class="px-6 py-4 w-20">{{ t('enabled') }}</th>
                                <th class="px-6 py-4 w-40">{{ t('type') }}</th>
                                <th class="px-6 py-4">{{ t('value') }}</th>
                                <th class="px-6 py-4 w-44">{{ t('group') }}</th>
                                <th class="px-6 py-4 w-16 text-center"></th>
                            </tr>
                        </thead>
                        <draggable v-model="draggableRules" 
                                   tag="tbody" 
                                   class="divide-y divide-slate-50 dark:divide-slate-800 block md:table-row-group" 
                                   handle=".drag-handle" 
                                   item-key="id" 
                                   @end="onDragEnd"
                                   :disabled="!!searchQuery || !!selectedGroup"
                                   :animation="200"
                                   ghost-class="ghost">
                            <template #item="{element}">
                                <tr class="group hover:bg-slate-50/50 transition-colors dark:hover:bg-slate-800/50 flex flex-wrap md:table-row p-4 md:p-0 border-b md:border-b-0 relative"
                                    :class="{'opacity-50 grayscale-[0.5]': !element.enabled, 'bg-blue-50/50 dark:bg-blue-900/20 ring-1 ring-blue-500/30 ring-inset new-rule-pulse': element.isNew}">
                                    
                                    <!-- Mobile Drag & Type -->
                                    <td class="w-2/3 md:w-12 md:table-cell p-0 md:px-4 md:py-4 flex items-center gap-3">
                                        <div class="drag-handle cursor-grab active:cursor-grabbing text-slate-300 hover:text-blue-500 transition-colors dark:text-slate-600 dark:hover:text-blue-400"
                                             v-if="element.type !== 'MATCH' && !searchQuery && !selectedGroup">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="12" r="1"></circle><circle cx="9" cy="5" r="1"></circle><circle cx="9" cy="19" r="1"></circle><circle cx="15" cy="12" r="1"></circle><circle cx="15" cy="5" r="1"></circle><circle cx="15" cy="19" r="1"></circle></svg>
                                        </div>
                                        <div class="md:hidden flex-grow">
                                            <select v-model="element.type" @change="updateRawByRule(element)"
                                                    class="bg-slate-100 hover:bg-slate-200 border-none text-[11px] font-black text-slate-600 cursor-pointer block w-full py-2 px-3 rounded-lg appearance-none transition-all dark:bg-slate-800 dark:text-slate-400 dark:hover:bg-slate-700">
                                                <option>DOMAIN-SUFFIX</option>
                                                <option>DOMAIN-KEYWORD</option>
                                                <option>DOMAIN</option>
                                                <option>IP-CIDR</option>
                                                <option>GEOIP</option>
                                                <option>GEOSITE</option>
                                                <option>IP-ASN</option>
                                                <option>RULE-SET</option>
                                                <option>AND</option>
                                                <option>OR</option>
                                                <option>MATCH</option>
                                                <option>OTHER</option>
                                            </select>
                                        </div>
                                    </td>

                                    <!-- Mobile Toggle & Delete -->
                                    <td class="w-1/3 md:w-20 md:table-cell p-0 md:px-6 md:py-4 flex justify-end items-center gap-3">
                                        <label class="relative inline-flex items-center cursor-pointer">
                                            <input type="checkbox" v-model="element.enabled" class="sr-only peer">
                                            <div class="w-10 h-5 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600 dark:bg-slate-700"></div>
                                        </label>
                                        <button @click="removeRule(element)" 
                                                class="md:hidden text-slate-300 hover:text-red-500 transition-all p-2 rounded-lg hover:bg-red-50 dark:text-slate-700 dark:hover:bg-red-900/20">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                                        </button>
                                    </td>

                                    <!-- Desktop Type -->
                                    <td class="hidden md:table-cell px-6 py-4 w-40">
                                        <select v-model="element.type" @change="updateRawByRule(element)"
                                                class="bg-slate-100 hover:bg-slate-200 border-none text-[11px] font-black text-slate-600 cursor-pointer block w-full py-1.5 px-3 rounded-lg appearance-none transition-all dark:bg-slate-800 dark:text-slate-400 dark:hover:bg-slate-700">
                                            <option>DOMAIN-SUFFIX</option>
                                            <option>DOMAIN-KEYWORD</option>
                                            <option>DOMAIN</option>
                                            <option>IP-CIDR</option>
                                            <option>GEOIP</option>
                                            <option>GEOSITE</option>
                                            <option>IP-ASN</option>
                                            <option>RULE-SET</option>
                                            <option>AND</option>
                                            <option>OR</option>
                                            <option>MATCH</option>
                                            <option>OTHER</option>
                                        </select>
                                    </td>

                                    <!-- Value -->
                                    <td class="w-full md:w-auto md:table-cell p-0 md:px-6 md:py-4 mt-3 md:mt-0">
                                        <div class="md:hidden text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1 px-1">{{ t('value') }}</div>
                                        <div class="bg-slate-50 md:bg-transparent p-3 md:p-0 rounded-xl dark:bg-slate-800/50 md:dark:bg-transparent">
                                            <template v-if="element.type === 'MATCH'">
                                                <span class="text-[11px] font-bold text-slate-300 italic dark:text-slate-600">{{ t('default') }}</span>
                                            </template>
                                            <input v-else type="text" v-model="element.value" @input="updateRawByRule(element)"
                                                   :placeholder="valuePlaceholders[element.type] || '...'"
                                                   class="w-full bg-transparent border-none text-sm focus:ring-0 p-0 text-slate-600 placeholder-slate-200 font-medium dark:text-slate-300 dark:placeholder-slate-700">
                                        </div>
                                    </td>

                                    <!-- Proxy Group -->
                                    <td class="w-full md:w-44 md:table-cell p-0 md:px-6 md:py-4 mt-2 md:mt-0">
                                        <div class="md:hidden text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1 px-1">{{ t('proxyGroup') }}</div>
                                        <select v-model="element.proxy_group" @change="updateRawByRule(element)" 
                                                class="bg-blue-50/50 hover:bg-blue-100 text-[11px] font-black text-blue-600 cursor-pointer block w-full py-2 md:py-1.5 px-4 md:px-3 rounded-xl md:rounded-lg appearance-none transition-all dark:bg-blue-900/20 dark:text-blue-400 dark:hover:bg-blue-900/40">
                                            <option v-for="g in proxyGroups" :key="g">{{g}}</option>
                                        </select>
                                    </td>

                                    <!-- Desktop Delete -->
                                    <td class="hidden md:table-cell px-6 py-4 w-16 text-center">
                                        <button @click="removeRule(element)" 
                                                class="text-slate-200 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all p-2 rounded-lg hover:bg-red-50 dark:text-slate-700 dark:hover:bg-red-900/20">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                                        </button>
                                    </td>
                                </tr>
                            </template>
                        </draggable>
                    </table>
                </div>
            </div>

            <!-- Footer Stats -->
            <div class="mt-8 flex justify-between items-center px-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                <div>VPN ROFL v1.1.0</div>
                <div v-if="hasChanges" class="text-blue-500 flex items-center gap-1 animate-pulse">
                    <div class="w-1.5 h-1.5 bg-blue-500 rounded-full"></div>
                    {{ t('unsavedChanges') }}
                </div>
            </div>
        </main>

        <!-- Global Loader -->
        <transition name="fade">
            <div v-if="loading" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md flex items-center justify-center z-[200]">
                <div class="bg-white p-8 rounded-3xl shadow-2xl flex flex-col items-center gap-4 animate-in zoom-in-95 duration-200 dark:bg-slate-900 dark:shadow-none dark:border dark:border-slate-800">
                    <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                    <p class="font-black text-slate-800 uppercase tracking-widest text-[10px] dark:text-slate-200">{{ t('loading') }}</p>
                </div>
            </div>
        </transition>

        <!-- Tooltip / Notifications -->
        <transition name="fade">
            <div v-if="notification" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[300] bg-slate-800 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 border border-slate-700 dark:bg-slate-900 dark:border-slate-800">
                <div class="text-sm font-bold">{{ notification }}</div>
            </div>
        </transition>

        <!-- Scroll Navigation Buttons -->
        <div class="fixed bottom-8 right-8 z-50 flex flex-col gap-3">
            <transition name="fade">
                <button v-show="!isAtTop" @click="scrollToTop" 
                        class="flex items-center justify-center w-12 h-12 bg-white border border-slate-200 text-slate-500 hover:text-blue-600 rounded-full shadow-lg transition-all hover:scale-110 active:scale-95 group dark:bg-slate-800 dark:border-slate-700 dark:text-slate-400 dark:hover:text-blue-400"
                        :title="t('scrollToTop')">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
                </button>
            </transition>
            
            <transition name="fade">
                <button v-show="!isAtBottom" @click="scrollToBottom" 
                        class="flex items-center justify-center w-12 h-12 bg-white border border-slate-200 text-slate-500 hover:text-blue-600 rounded-full shadow-lg transition-all hover:scale-110 active:scale-95 group dark:bg-slate-800 dark:border-slate-700 dark:text-slate-400 dark:hover:text-blue-400"
                        :title="t('scrollToBottom')">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                </button>
            </transition>
        </div>
    </div>

    <style>
        .fade-enter-active, .fade-leave-active { transition: all 0.2s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; transform: translateY(10px); }
        [v-cloak] { display: none; }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        .new-rule-pulse {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* Custom scrollbar for table container */
        .overflow-x-auto::-webkit-scrollbar { height: 4px; }
        .overflow-x-auto::-webkit-scrollbar-track { background: transparent; }
        .overflow-x-auto::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }
        .ghost { opacity: 0.5; background: #c8ebfb; }
    </style>

    <script>
        const { createApp } = Vue
        
        const locales = {
            ru: {
                title: 'Mihomo Rules',
                manager: 'Manager',
                total: 'всего',
                active: 'активно',
                notSaved: 'Не сохранено',
                lightTheme: 'Светлая тема',
                darkTheme: 'Темная тема',
                update: 'Обновить',
                save: 'Сохранить',
                search: 'Поиск...',
                allGroups: 'Все группы',
                addRule: 'Правило',
                addGroup: 'Добавить группу',
                refreshList: 'Обновить список',
                enabled: 'Вкл',
                type: 'Тип',
                value: 'Значение',
                group: 'Группа',
                default: 'По умолчанию',
                proxyGroup: 'Группа прокси',
                unsavedChanges: 'Есть несохраненные изменения',
                loading: 'Загрузка...',
                configLoaded: 'Конфигурация загружена',
                updating: 'Обновление... Перезапуск через 3 сек.',
                ruleAdded: 'Правило добавлено в конец списка',
                groupNamePrompt: 'Название группы:',
                deleteConfirm: 'Удалить?',
                saveSuccess: 'Успешно сохранено и применено',
                updateConfirm: 'Обновить ПО?',
                scrollToBottom: 'Вниз',
                scrollToTop: 'Вверх'
            },
            en: {
                title: 'Mihomo Rules',
                manager: 'Manager',
                total: 'total',
                active: 'active',
                notSaved: 'Not saved',
                lightTheme: 'Light theme',
                darkTheme: 'Dark theme',
                update: 'Update',
                save: 'Save',
                search: 'Search...',
                allGroups: 'All groups',
                addRule: 'Rule',
                addGroup: 'Add group',
                refreshList: 'Refresh list',
                enabled: 'On',
                type: 'Type',
                value: 'Value',
                group: 'Group',
                default: 'Default',
                proxyGroup: 'Proxy group',
                unsavedChanges: 'Unsaved changes',
                loading: 'Loading...',
                configLoaded: 'Configuration loaded',
                updating: 'Updating... Restarting in 3 sec.',
                ruleAdded: 'Rule added to the end of the list',
                groupNamePrompt: 'Group name:',
                deleteConfirm: 'Delete?',
                saveSuccess: 'Successfully saved and applied',
                updateConfirm: 'Update software?',
                scrollToBottom: 'Scroll to bottom',
                scrollToTop: 'Scroll to top'
            }
        }

        createApp({
            components: {
                draggable: window.vuedraggable
            },
            data() {
                return {
                    rules: [],
                    proxyGroups: [],
                    loading: false,
                    isScrolled: false,
                    isAtTop: true,
                    isAtBottom: false,
                    isDark: false,
                    lang: 'en',
                    searchQuery: '',
                    selectedGroup: '',
                    notification: '',
                    originalRulesJson: '[]',
                    originalGroupsJson: '[]',
                    hasChanges: false,
                    valuePlaceholders: {
                        'DOMAIN-SUFFIX': 'google.com',
                        'DOMAIN-KEYWORD': 'google',
                        'DOMAIN': 'google.com',
                        'IP-CIDR': '192.168.1.0/24',
                        'GEOIP': 'CN',
                        'GEOSITE': 'youtube',
                        'IP-ASN': '13335',
                        'RULE-SET': 'ruleset-name'
                    }
                }
            },
            watch: {
                rules: { handler() { this.checkChanges() }, deep: true },
                proxyGroups: { handler() { this.checkChanges() }, deep: true },
                searchQuery() { this.$nextTick(() => { this.handleScroll() }) },
                selectedGroup() { this.$nextTick(() => { this.handleScroll() }) }
            },
            computed: {
                activeCount() { return this.rules.filter(r => r.enabled).length },
                draggableRules: {
                    get() { return this.filteredRules },
                    set(value) {
                        if (!this.selectedGroup && !this.searchQuery) {
                            this.rules = value
                        }
                    }
                },
                filteredRules() {
                    let res = [...this.rules]
                    if (this.selectedGroup) res = res.filter(r => r.proxy_group === this.selectedGroup)
                    if (this.searchQuery) {
                        const q = this.searchQuery.toLowerCase()
                        res = res.filter(r =>
                            (r.value && r.value.toLowerCase().includes(q)) ||
                            (r.type && r.type.toLowerCase().includes(q)) ||
                            (r.proxy_group && r.proxy_group.toLowerCase().includes(q))
                        )
                    }
                    return res
                }
            },
            methods: {
                t(key) {
                    return locales[this.lang][key] || key
                },
                toggleLang() {
                    this.lang = this.lang === 'ru' ? 'en' : 'ru'
                    localStorage.setItem('lang', this.lang)
                },
                onDragEnd() {
                    this.hasChanges = true
                    this.ensureMatchAtEnd()
                },
                checkChanges() {
                    this.hasChanges = JSON.stringify(this.rules) !== this.originalRulesJson || 
                                     JSON.stringify(this.proxyGroups) !== this.originalGroupsJson
                },
                showNotify(msg) {
                    this.notification = msg
                    setTimeout(() => { if (this.notification === msg) this.notification = '' }, 3000)
                },
                fetchConfig() {
                    this.loading = true
                    fetch('/api/config')
                        .then(res => res.json())
                        .then(data => {
                            this.rules = data.rules
                            this.proxyGroups = data.proxy_groups
                            this.ensureMatchAtEnd()
                            this.originalRulesJson = JSON.stringify(this.rules)
                            this.originalGroupsJson = JSON.stringify(this.proxyGroups)
                            this.hasChanges = false
                            this.showNotify(this.t('configLoaded'))
                            this.$nextTick(() => { this.handleScroll() })
                        })
                        .catch(err => alert('Error: ' + err))
                        .finally(() => this.loading = false)
                },
                updateApp() {
                    if (!confirm(this.t('updateConfirm'))) return
                    this.loading = true
                    fetch('/api/update', { method: 'POST' })
                        .then(async res => {
                            const data = await res.json()
                            if (res.ok) {
                                this.showNotify(this.t('updating'))
                                setTimeout(() => location.reload(), 3000)
                            } else {
                                alert('Error: ' + data.error)
                            }
                        })
                        .catch(err => alert('Error: ' + err))
                        .finally(() => this.loading = false)
                },
                ensureMatchAtEnd() {
                    const matches = this.rules.filter(r => r.type === 'MATCH')
                    const others = this.rules.filter(r => r.type !== 'MATCH')
                    this.rules = [...others, ...matches]
                },
                addRule() {
                    // Clear filters to see new rule
                    this.searchQuery = ''
                    this.selectedGroup = ''

                    const newId = Math.max(0, ...this.rules.map(r => r.id)) + 1
                    const newRule = {
                        id: newId, 
                        enabled: true, 
                        type: 'DOMAIN-SUFFIX',
                        value: '', 
                        proxy_group: this.proxyGroups[0] || 'Proxy', 
                        raw: '',
                        isNew: true
                    }
                    this.updateRawByRule(newRule)
                    
                    // Add before MATCH (or at end if no MATCH)
                    const matchIdx = this.rules.findIndex(r => r.type === 'MATCH')
                    if (matchIdx !== -1) {
                        this.rules.splice(matchIdx, 0, newRule)
                    } else {
                        this.rules.push(newRule)
                    }
                    
                    this.showNotify(this.t('ruleAdded'))
                    
                    // Remove highlight after some time
                    setTimeout(() => {
                        newRule.isNew = false
                    }, 5000)

                    // Scroll down and focus input
                    this.$nextTick(() => {
                        this.scrollToBottom()
                        setTimeout(() => {
                            const rows = document.querySelectorAll('table tbody tr')
                            const matchRowIdx = Array.from(rows).findIndex(row => row.innerText.includes(this.t('default')))
                            const targetRow = matchRowIdx !== -1 ? rows[matchRowIdx - 1] : rows[rows.length - 1]
                            if (targetRow) {
                                const input = targetRow.querySelector('td:nth-child(4) input')
                                if (input) input.focus()
                            }
                        }, 500)
                    })
                },
                addGroup() {
                    const name = prompt(this.t('groupNamePrompt'))
                    if (name && name.trim()) {
                        const n = name.trim()
                        if (!this.proxyGroups.includes(n)) {
                            this.proxyGroups.push(n)
                            this.showNotify(this.t('addGroup'))
                        }
                    }
                },
                removeRule(rule) {
                    if (confirm(this.t('deleteConfirm'))) {
                        const idx = this.rules.findIndex(r => r.id === rule.id)
                        if (idx !== -1) this.rules.splice(idx, 1)
                    }
                },
                updateRawByRule(rule) {
                    if (rule.type === 'MATCH') {
                        rule.raw = `${rule.type},${rule.proxy_group}`
                    } else if (rule.type !== 'OTHER') {
                        const val = rule.value ? rule.value + ',' : ''
                        rule.raw = `${rule.type},${val}${rule.proxy_group}`
                    }
                },
                handleScroll() {
                    this.isScrolled = window.scrollY > 20
                    this.isAtTop = window.scrollY < 50
                    this.isAtBottom = (window.innerHeight + window.scrollY) >= (document.documentElement.scrollHeight - 50)
                },
                scrollToBottom() {
                    window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'smooth' })
                },
                scrollToTop() {
                    window.scrollTo({ top: 0, behavior: 'smooth' })
                },
                toggleTheme() {
                    this.isDark = !this.isDark
                    localStorage.setItem('theme', this.isDark ? 'dark' : 'light')
                    if (this.isDark) document.documentElement.classList.add('dark')
                    else document.documentElement.classList.remove('dark')
                },
                async saveConfig() {
                    this.loading = true
                    try {
                        const res = await fetch('/api/rules', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ rules: this.rules, proxy_groups: this.proxyGroups })
                        })
                        if (res.ok) {
                            this.originalRulesJson = JSON.stringify(this.rules)
                            this.originalGroupsJson = JSON.stringify(this.proxyGroups)
                            this.hasChanges = false
                            this.showNotify(this.t('saveSuccess'))
                        } else {
                            const d = await res.json()
                            alert('Error: ' + d.error)
                        }
                    } catch (err) { alert('Error: ' + err) }
                    finally { this.loading = false }
                }
            },
            mounted() {
                const savedLang = localStorage.getItem('lang')
                if (savedLang) {
                    this.lang = savedLang
                } else {
                    const browserLang = navigator.language || navigator.userLanguage
                    if (browserLang.startsWith('ru')) {
                        this.lang = 'ru'
                    }
                }

                this.fetchConfig()
                const savedTheme = localStorage.getItem('theme')
                if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    this.isDark = true
                    document.documentElement.classList.add('dark')
                }
                
                window.addEventListener('scroll', this.handleScroll)
                // Initial check
                this.handleScroll()
                
                window.addEventListener('keydown', (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); this.saveConfig() }
                })
            }
        }).mount('#app')
    </script>
</body>
</html>
